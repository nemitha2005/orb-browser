<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:;" />
  <title>Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #0f0f0f;
      --surface:    #1a1a1a;
      --surface2:   #242424;
      --border:     #2e2e2e;
      --accent:     #7c5cfc;
      --accent-dim: #5a3fd4;
      --text:       #e8e8e8;
      --text-dim:   #777;
      --radius:     8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    #titlebar {
      -webkit-app-region: drag;
      height: 44px;
      background: var(--bg);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    #titlebar-spacer { width: 68px; flex-shrink: 0; }

    #orb-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    #tabbar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: var(--bg);
      flex-shrink: 0;
    }

    #tabs {
      display: flex;
      gap: 4px;
      flex: 1;
      overflow: hidden;
    }

    .tab {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: var(--radius);
      background: var(--surface);
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      max-width: 180px;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    .tab:hover { background: var(--surface2); color: var(--text); }

    .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .tab-close {
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      border: none;
      background: none;
      line-height: 1;
    }

    .tab-close:hover { background: #ffffff15; color: var(--text); }

    #btn-new-tab {
      -webkit-app-region: no-drag;
      width: 26px;
      height: 26px;
      border-radius: var(--radius);
      background: var(--surface);
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      line-height: 1;
    }

    #btn-new-tab:hover { background: var(--surface2); color: var(--text); }

    #navbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 8px;
      background: var(--bg);
      flex-shrink: 0;
    }

    .nav-btn {
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .nav-btn:hover { background: var(--surface); color: var(--text); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    .nav-btn:disabled:hover { background: none; }

    #address-bar {
      flex: 1;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 0 12px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-user-select: text;
      user-select: text;
    }

    #address-bar:focus { border-color: var(--accent); }
    #address-bar::placeholder { color: var(--text-dim); }

    #btn-float {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      background: var(--accent);
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #btn-float:hover { background: var(--accent-dim); }

    #browser-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    #new-tab-page {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--bg);
    }

    #new-tab-page h1 {
      font-size: 52px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c5cfc 0%, #c084fc 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    #new-tab-page p {
      color: var(--text-dim);
      font-size: 14px;
    }

    #new-tab-search {
      width: 500px;
      height: 46px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      padding: 0 20px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-user-select: text;
      user-select: text;
    }

    #new-tab-search:focus { border-color: var(--accent); }
    #new-tab-search::placeholder { color: var(--text-dim); }

    .hint {
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.6;
    }

    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: inherit;
    }
  </style>
</head>
<body>

  <div id="titlebar">
    <div id="titlebar-spacer"></div>
    <span id="orb-logo">Orb</span>
  </div>

  <div id="tabbar">
    <div id="tabs"></div>
    <button id="btn-new-tab" title="New tab (Cmd+T)">+</button>
  </div>

  <div id="navbar">
    <button class="nav-btn" id="btn-back"    title="Back">‹</button>
    <button class="nav-btn" id="btn-forward" title="Forward">›</button>
    <button class="nav-btn" id="btn-reload"  title="Reload">↻</button>
    <input id="address-bar" type="text" placeholder="Search or enter a URL…" spellcheck="false" />
    <button id="btn-float" title="Floating window (Cmd+Shift+O)">◎</button>
  </div>

  <div id="browser-area">
    <div id="new-tab-page">
      <h1>Orb</h1>
      <p>Focus on what matters. Browse by project.</p>
      <input id="new-tab-search" type="text" placeholder="Search or enter a URL…" autofocus spellcheck="false" />
      <p class="hint">
        <kbd>Cmd+T</kbd> new tab &nbsp;·&nbsp;
        <kbd>Cmd+W</kbd> close tab &nbsp;·&nbsp;
        <kbd>Cmd+Shift+O</kbd> floating window
      </p>
    </div>
  </div>

  <script src="./browser.js"></script>
</body>
</html>
